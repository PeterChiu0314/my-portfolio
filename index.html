<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Chiu | 影像作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #121212; 
            color: #D1D1D1; 
            font-family: 'Noto Serif TC', serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 影片載入遮罩 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            z-index: 9999;
            transition: opacity 1.5s ease;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loading-screen.fade-out { opacity: 0; }

        /* 導覽列 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 1.2rem; letter-spacing: 4px; color: #FFFFFF; }
        .nav-links a { color: #AAAAAA; text-decoration: none; margin-left: 30px; font-size: 0.9rem; letter-spacing: 2px; transition: color 0.3s; }
        .nav-links a:hover { color: #FFFFFF; }

        /* Hero 影片區 (背景層) */
        .hero {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
            will-change: transform, filter;
        }

        .video-background iframe {
            width: 100vw;
            height: 115vh;
            min-height: 115vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(18,18,18,1) 0%, rgba(18,18,18,0) 25%, rgba(18,18,18,0) 75%, rgba(18,18,18,1) 100%);
            z-index: 2;
        }

        .hero-content {
            z-index: 5;
            position: relative;
            animation: heroEntrance 2.5s cubic-bezier(0.2, 1, 0.3, 1) 2s both;
        }

        @keyframes heroEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hero-title { font-size: 3.2rem; font-weight: 500; letter-spacing: 18px; margin-bottom: 25px; color: #FFFFFF; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hero-subtitle-container { display: flex; flex-direction: column; align-items: center; gap: 12px; opacity: 0; animation: fadeIn 2s ease-out 3s forwards; }
        .hero-subtitle-en { font-size: 0.9rem; letter-spacing: 5px; color: #888; text-transform: uppercase; }
        .hero-subtitle-zh { font-size: 1rem; letter-spacing: 4px; color: #AAA; font-weight: 300; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 0.8; transform: translateY(0); } }

        /* --- 作品區塊 --- */
        .works-section {
            position: relative;
            z-index: 10; 
            margin-top: 100vh;
            padding: 180px 40px;
            background-color: #121212;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 150px);
            mask-image: linear-gradient(to bottom, transparent 0%, black 150px);
        }

        .interior-section, .video-section {
            margin-top: 0; 
            padding-top: 0; 
            -webkit-mask-image: none;
            mask-image: none;
        }

        .section-title { font-size: 1.4rem; letter-spacing: 10px; text-align: center; color: #FFFFFF; font-weight: 300; margin-bottom: 15px; }
        .section-subtitle { font-size: 0.85rem; letter-spacing: 4px; text-align: center; color: #666; margin-bottom: 80px; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 320px;
            grid-auto-flow: dense;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-item { position: relative; overflow: hidden; background-color: #1a1a1a; cursor: zoom-in; }
        .photo-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            filter: brightness(0.8) grayscale(10%);
        }
        .photo-item:hover img { transform: scale(1.08); filter: brightness(1) grayscale(0%); }

        .large { grid-column: span 2; grid-row: span 2; }
        .tall { grid-column: span 1; grid-row: span 2; }
        .wide { grid-column: span 2; grid-row: span 1; }

        /* --- 影片網格樣式 (新增) --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .video-item { cursor: pointer; }
        .video-cover { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #1a1a1a; }
        .video-cover img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: all 0.8s ease; }
        .play-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            opacity: 0.5; transition: all 0.5s ease; width: 60px; height: 60px;
        }
        .video-item:hover .video-cover img { transform: scale(1.05); opacity: 0.9; }
        .video-item:hover .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        .video-info { margin-top: 15px; text-align: left; }
        .video-info h3 { font-size: 1rem; font-weight: 300; letter-spacing: 2px; color: #FFF; }
        .video-info p { font-size: 0.8rem; color: #666; margin-top: 5px; }

        /* --- 深度優化彈窗動畫 --- */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0); 
            backdrop-filter: blur(0px); 
            -webkit-backdrop-filter: blur(0px);
            z-index: 1000;
            cursor: zoom-out;
            justify-content: center;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            will-change: backdrop-filter, background; 
        }
        
        #lightbox.active {
            display: flex;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        #lightbox-content {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            transform: scale(0.7) translateY(30px); 
            opacity: 0;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        }
        
        #lightbox.active #lightbox-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        #lightbox img, #lightbox iframe { width: 100%; height: 100%; object-fit: contain; }
        #lightbox iframe { aspect-ratio: 16/9; width: 80vw; }

        /* --- 回到頂部按鈕樣式 --- */
        #back-to-top {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #back-to-top:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }
        #back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <div id="loading-screen"></div>

    <nav>
        <div class="logo">PETER CHIU</div>
        <div class="nav-links">
            <a href="#nature">NATURE</a>
            <a href="#cinema">CINEMA</a>
            <a href="#interior">INTERIOR</a>
            <a href="https://www.flickr.com/photos/peterchiu0314/" target="_blank">FLICKR</a>
        </div>
    </nav>

    <section class="hero">
        <div class="video-background">
            <iframe id="hero-video" src="https://www.youtube.com/embed/3QTMVksP2xI?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=3QTMVksP2xI&start=11&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3" frameborder="0"></iframe>
            <div class="overlay"></div>
        </div>
        <div class="hero-content" id="heroContent">
            <h1 class="hero-title">野徑微光的紀錄者</h1>
            <div class="hero-subtitle-container">
                <p class="hero-subtitle-en">Capture the fleeting light.</p>
                <p class="hero-subtitle-zh">用最真實的影像，紀錄稍縱即逝的回憶。</p>
            </div>
        </div>
    </section>

    <section id="nature" class="works-section">
        <h2 class="section-title">NATURE & TRAVEL</h2>
        <p class="section-subtitle">野徑、微光與流浪的痕跡</p>
        <div class="photo-grid">
            <div class="photo-item large">
                <img src="https://live.staticflickr.com/65535/54491742976_0c442c6b6b_k.jpg" alt="Nature 1">
            </div>
            <div class="photo-item wide">
                <img src="https://live.staticflickr.com/65535/51374969201_e7803e8ae3_k.jpg" alt="Nature 2">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/51596162175_9e698b7d0f_k.jpg" alt="Nature 3">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/53667814818_64d2005cf5_k.jpg" alt="Nature 4">
            </div>
            <div class="photo-item tall">
                <img src="https://live.staticflickr.com/65535/52651908073_2082da090a_b.jpg" alt="Nature 5">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/52213948186_a526fe57f0_k.jpg" alt="Nature 6">
            </div>
            <div class="photo-item large">
                <img src="https://live.staticflickr.com/65535/54473516983_840fddefd4_k.jpg" alt="Nature 7">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/49497006952_b81e6f5ee4_k.jpg" alt="Nature 8">
            </div>
        </div>
    </section>

    <section id="cinema" class="works-section video-section">
        <h2 class="section-title">CINEMATIC SCENES</h2>
        <p class="section-subtitle">影像、環境音與流浪的紀錄</p>
        <div class="video-grid">
            <div class="video-item photo-item" onclick="openVideo('3QTMVksP2xI')">
                <div class="video-cover">
                    <img src="https://img.youtube.com/vi/3QTMVksP2xI/maxresdefault.jpg" alt="Cinema 1">
                    <div class="play-icon">
                        <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="video-info">
                    <h3>雨中的車泊紀錄：北海岸金山</h3>
                    <p>Cinematic ASMR / No Voiceover</p>
                </div>
            </div>
            <div class="video-item photo-item" onclick="openVideo('dQw4w9WgXcQ')"> <div class="video-cover">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg" alt="Cinema 2">
                    <div class="play-icon">
                        <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="video-info">
                    <h3>宜蘭地景攝影：野徑微光</h3>
                    <p>Nature Documentary / 4K Cinematic</p>
                </div>
            </div>
        </div>
    </section>

    <section id="interior" class="works-section interior-section">
        <h2 class="section-title">INTERIOR DESIGN</h2>
        <p class="section-subtitle">線條、空間與光影的對話</p>
        <div class="photo-grid">
            <div class="photo-item large">
                <img src="https://live.staticflickr.com/65535/55147244082_b285974d24_b.jpg" alt="Interior 1">
            </div>
            <div class="photo-item wide">
                <img src="https://live.staticflickr.com/65535/53745824775_e618889b48_k.jpg" alt="Interior 2">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/53744486207_d54dadb4c4_k.jpg" alt="Interior 3">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/53745595828_559d5a6bed_k.jpg" alt="Interior 4">
            </div>
        </div>
    </section>

    <div id="lightbox">
        <div id="lightbox-content">
            </div>
    </div>

    <button id="back-to-top" title="回到頂部">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script>
    // 1. YouTube IFrame API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('hero-video', {
            events: { 'onStateChange': onPlayerStateChange }
        });
    }
    
    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            const loader = document.getElementById('loading-screen');
            setTimeout(() => { loader.classList.add('fade-out'); }, 200); 
            startHeroObserver();
        }
    }
    
    // 2. 效能優化 (自動播放/暫停 Hero 影片)
    function startHeroObserver() {
        const heroObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (player && player.pauseVideo && player.playVideo) {
                    if (entry.isIntersecting) {
                        player.playVideo();
                    } else {
                        player.pauseVideo();
                    }
                }
            });
        }, { threshold: 0 });
        heroObserver.observe(document.querySelector('.hero'));
    }
    
    // 3. 主頁視差
    window.addEventListener('scroll', function() {
        const hero = document.querySelector('.hero');
        const heroContent = document.getElementById('heroContent');
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        if (scrollTop > 0) {
            hero.style.transform = `translateY(-${scrollTop * 0.4}px)`;
            let blurVal = Math.min(scrollTop / 60, 10);
            hero.style.filter = `blur(${blurVal}px)`;
            
            let opacity = 1 - (scrollTop / 500); 
            heroContent.style.opacity = opacity >= 0 ? opacity : 0;
            heroContent.style.transform = `translateY(-${scrollTop * 0.1}px)`;
        } else {
            hero.style.transform = `translateY(0px)`;
            hero.style.filter = `blur(0px)`;
            heroContent.style.opacity = 1;
            heroContent.style.transform = `translateY(0px)`;
        }
    });
    
    // 4. 作品集捲動浮現效果
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = "1";
                entry.target.style.transform = "translateY(0)";
                entry.target.style.filter = "blur(0px)";
            } else {
                entry.target.style.opacity = "0";
                entry.target.style.transform = "translateY(50px)";
                entry.target.style.filter = "blur(5px)";
            }
        });
    }, { 
        threshold: 0.1,  
        rootMargin: "0px 0px -50px 0px" 
    });
    
    document.querySelectorAll('.photo-item').forEach(item => {
        item.style.opacity = "0";
        item.style.transform = "translateY(50px)";
        item.style.filter = "blur(5px)";
        item.style.transition = "all 1s cubic-bezier(0.2, 1, 0.3, 1)";
        observer.observe(item);
    });

    // 5. 升級後的彈窗邏輯 (整合圖片與影片)
    const lightbox = document.getElementById('lightbox');
    const lightboxContent = document.getElementById('lightbox-content');
    
    // 照片點擊事件
    document.querySelectorAll('.photo-grid .photo-item img').forEach(img => {
        img.addEventListener('click', (e) => {
            e.stopPropagation();
            openLightbox(`<img src="${img.src}">`);
        });
    });

    // 影片點擊呼叫函式
    function openVideo(id) {
        const iframeHtml = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        openLightbox(iframeHtml);
    }

    function openLightbox(content) {
        lightbox.style.display = 'flex';
        void lightbox.offsetWidth; 
        lightboxContent.innerHTML = content;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto';
        setTimeout(() => {
            if (!lightbox.classList.contains('active')) {
                lightbox.style.display = 'none';
                lightboxContent.innerHTML = ''; 
            }
        }, 500); 
    });

    // 6. 回到頂部按鈕邏輯
    const backToTopBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
        if (window.pageYOffset > window.innerHeight / 2) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }
    });

    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    </script>
</body>
</html>
