<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Chiu | 影像作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #121212; 
            color: #D1D1D1; 
            font-family: 'Noto Serif TC', serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 進場動畫定義 */
        @keyframes heroEntrance {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 影片區與遮罩 */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .video-background iframe {
            width: 100vw;
            height: 115vh; /* 拉高影片以遮擋標題 */
            min-height: 115vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom, 
                rgba(18, 18, 18, 1) 0%,      
                rgba(18, 18, 18, 0.6) 15%,   
                rgba(18, 18, 18, 0) 35%,     
                rgba(18, 18, 18, 0) 65%,     
                rgba(18, 18, 18, 0.6) 85%,   
                rgba(18, 18, 18, 1) 100%     
            );
            z-index: 1;
        }

        /* 導覽列 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 1.2rem; letter-spacing: 4px; color: #FFFFFF; }
        .nav-links a { color: #AAAAAA; text-decoration: none; margin-left: 30px; font-size: 0.9rem; letter-spacing: 2px; }

        /* 標題與動畫應用 */
        .hero-content {
            z-index: 5;
            position: relative;
            animation: heroEntrance 2s ease-out 0.8s both; /* 進場動畫：延遲0.8秒開始 */
            transition: opacity 0.1s ease-out;
        }

        .hero-title { font-size: 3.5rem; font-weight: 300; letter-spacing: 12px; margin-bottom: 20px; color: #FFFFFF; }
        .hero-subtitle { font-size: 1.1rem; letter-spacing: 6px; opacity: 0.8; }

        /* 作品區網格 */
        .works-section { background-color: #121212; padding: 100px 40px; }
        .section-title { font-size: 1.2rem; letter-spacing: 8px; text-align: center; margin-bottom: 80px; color: #FFFFFF; font-weight: 300; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 300px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-item { position: relative; overflow: hidden; background-color: #1a1a1a; }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s cubic-bezier(0.2, 1, 0.3, 1);
            filter: grayscale(10%) brightness(0.8);
        }

        .photo-item:hover img { transform: scale(1.1); filter: grayscale(0%) brightness(1.1); }

        .large { grid-column: span 2; grid-row: span 2; }
        .tall { grid-column: span 1; grid-row: span 2; }
        .wide { grid-column: span 2; grid-row: span 1; }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .photo-grid { grid-template-columns: 1fr; grid-auto-rows: 300px; }
            .large, .tall, .wide { grid-column: span 1; grid-row: span 1; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PETER CHIU</div>
        <div class="nav-links">
            <a href="#works">WORKS</a>
            <a href="https://www.flickr.com/photos/peterchiu0314/" target="_blank">FLICKR</a>
            <a href="#">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="video-background">
            <iframe src="https://www.youtube.com/embed/J7vEna9qweM?autoplay=1&mute=1&loop=1&playlist=J7vEna9qweM&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&origin=https://peterchiu0314.github.io" frameborder="0"></iframe>
            <div class="overlay"></div>
        </div>
        <div class="hero-content" id="heroContent">
            <h1 class="hero-title">暴風前夕</h1>
            <p class="hero-subtitle">在迷霧的宜蘭，記錄影像的溫度</p>
        </div>
    </section>

    <section id="works" class="works-section">
        <h2 class="section-title">SELECTED WORKS</h2>
        <div class="photo-grid">
            <div class="photo-item large">
                <img src="https://img.youtube.com/vi/J7vEna9qweM/maxresdefault.jpg" alt="宜蘭空拍">
            </div>
            <div class="photo-item">
                <img src="https://img.youtube.com/vi/3QTMVksP2xI/maxresdefault.jpg" alt="車泊生活">
            </div>
            <div class="photo-item tall">
                <img src="https://live.staticflickr.com/65535/53549221008_3a1d9b3d9c_b.jpg" alt="Flickr 作品示範">
            </div>
            <div class="photo-item wide">
                <img src="https://live.staticflickr.com/65535/53549221010_4a2d8b3d8c_b.jpg" alt="Flickr 作品示範">
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', function() {
            const heroContent = document.getElementById('heroContent');
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            let opacity = 1 - (scrollTop / 450);
            if (opacity >= 0) {
                heroContent.style.opacity = opacity;
                heroContent.style.transform = `translateY(${scrollTop * 0.3}px)`;
            } else {
                heroContent.style.opacity = 0;
            }
        });
    </script>
</body>
</html>
