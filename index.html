<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Chiu | 影像作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #121212; 
            color: #D1D1D1; 
            font-family: 'Noto Serif TC', serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 影片載入遮罩：遮掉 YouTube 圈圈 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            z-index: 9999;
            transition: opacity 1.5s ease; /* 緩慢淡出增加高級感 */
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loading-screen.fade-out {
            opacity: 0;
        }

        /* 影片區與遮罩 */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .video-background iframe {
            width: 100vw;
            height: 115vh;
            min-height: 115vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom, 
                rgba(18, 18, 18, 1) 0%,      
                rgba(18, 18, 18, 0.4) 10%,   
                rgba(18, 18, 18, 0) 25%,     
                rgba(18, 18, 18, 0) 75%,     
                rgba(18, 18, 18, 0.4) 90%,   
                rgba(18, 18, 18, 1) 100%     
            );
            z-index: 1;
        }

        /* 導覽列 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 1.2rem; letter-spacing: 4px; color: #FFFFFF; }
        .nav-links a { color: #AAAAAA; text-decoration: none; margin-left: 30px; font-size: 0.9rem; letter-spacing: 2px; }

        /* 標題進場動畫修正 */
        .hero-content {
            z-index: 5;
            position: relative;
            animation: heroEntrance 1.5s cubic-bezier(0.2, 1, 0.3, 1) 0.2s both;
        }

        @keyframes heroEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 18px;
            margin-bottom: 25px;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .hero-subtitle-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0; 
            animation: fadeIn 2s ease-out 0.8s forwards; 
        }
        
        .hero-subtitle-en {
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: #AAAAAA;
            text-transform: uppercase;
        }
        
        .hero-subtitle-zh {
            font-size: 1rem;
            letter-spacing: 4px;
            color: #D1D1D1;
            font-weight: 300;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 0.8; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .hero-title { font-size: 2.2rem; letter-spacing: 8px; }
            .hero-subtitle-zh { font-size: 0.85rem; padding: 0 20px; }
        }

        /* 作品區網格 */
        .works-section {
            background-color: #121212;
            padding: 200px 40px;
            margin-top: -10vh;   
        }
        .section-title { font-size: 1.2rem; letter-spacing: 8px; text-align: center; margin-bottom: 80px; color: #FFFFFF; font-weight: 300; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 300px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-item { position: relative; overflow: hidden; background-color: #1a1a1a; }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s cubic-bezier(0.2, 1, 0.3, 1);
            filter: grayscale(10%) brightness(0.8);
        }

        .photo-item:hover img { transform: scale(1.1); filter: grayscale(0%) brightness(1.1); }

        .large { grid-column: span 2; grid-row: span 2; }
        .tall { grid-column: span 1; grid-row: span 2; }
        .wide { grid-column: span 2; grid-row: span 1; }

        @media (max-width: 768px) {
            .photo-grid { grid-template-columns: 1fr; grid-auto-rows: 300px; }
            .large, .tall, .wide { grid-column: span 1; grid-row: span 1; }
        }
    </style>
</head>
<body>

    <div id="loading-screen"></div>

    <nav>
        <div class="logo">PETER CHIU</div>
        <div class="nav-links">
            <a href="#works">WORKS</a>
            <a href="https://www.flickr.com/photos/peterchiu0314/" target="_blank">FLICKR</a>
            <a href="#">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="video-background">
            <iframe id="hero-video" src="https://www.youtube.com/embed/3QTMVksP2xI?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=3QTMVksP2xI&start=11&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&origin=https://peterchiu0314.github.io" frameborder="0"></iframe>
            <div class="overlay"></div>
        </div>
        <div class="hero-content" id="heroContent">
            <h1 class="hero-title">野徑微光的紀錄者</h1>
            <div class="hero-subtitle-container">
                <p class="hero-subtitle-en">Capture the fleeting light.</p>
                <p class="hero-subtitle-zh">用最真實的影像，紀錄稍縱即逝的回憶。</p>
            </div>
        </div>
    </section>

    <section id="works" class="works-section">
        <h2 class="section-title">SELECTED WORKS</h2>
        <div class="photo-grid">
            <div class="photo-item large">
                <img src="https://img.youtube.com/vi/J7vEna9qweM/maxresdefault.jpg" alt="宜蘭空拍">
            </div>
            <div class="photo-item">
                <img src="https://img.youtube.com/vi/3QTMVksP2xI/maxresdefault.jpg" alt="車泊生活">
            </div>
            <div class="photo-item">
                <img src="https://live.staticflickr.com/65535/53667814818_64d2005cf5_k.jpg" alt="富士山">
            </div>            
            <div class="photo-item tall">
                <img src="https://live.staticflickr.com/65535/54492009753_f3e57d4fb1_k.jpg" alt="Flickr 作品示範">
            </div>
            <div class="photo-item wide">
                <img src="https://live.staticflickr.com/65535/54473516983_840fddefd4_k.jpg" alt="Flickr 作品示範">
            </div>
        </div>
    </section>

    <script>
        // 1. YouTube IFrame API 控制
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('hero-video', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            // 當影片開始播放 (YT.PlayerState.PLAYING = 1)
            if (event.data == YT.PlayerState.PLAYING) {
                const loader = document.getElementById('loading-screen');
                // 緩衝完成後，淡出黑色遮罩
                setTimeout(() => {
                    loader.classList.add('fade-out');
                }, 500); 
            }
        }

        // 2. 處理標題淡出效果
        window.addEventListener('scroll', function() {
            const heroContent = document.getElementById('heroContent');
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > 5) {
                let opacity = 1 - (scrollTop / 450);
                heroContent.style.opacity = opacity >= 0 ? opacity : 0;
                heroContent.style.transform = `translateY(${scrollTop * 0.3}px)`;
            } else {
                heroContent.style.opacity = 1;
                heroContent.style.transform = `translateY(0px)`;
            }
        });
    
        // 3. 處理作品集浮現效果
        const observerOptions = {
            threshold: 0.15,
            rootMargin: "0px 0px -50px 0px"
        };
    
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                    entry.target.style.transform = "translateY(0)";
                    entry.target.style.filter = "blur(0px)";
                } else {
                    entry.target.style.opacity = "0";
                    entry.target.style.transform = "translateY(60px)";
                    entry.target.style.filter = "blur(5px)";
                }
            });
        }, observerOptions);
    
        document.querySelectorAll('.photo-item').forEach(item => {
            item.style.opacity = "0";
            item.style.transform = "translateY(60px)";
            item.style.filter = "blur(5px)";
            item.style.transition = "all 1.2s cubic-bezier(0.22, 1, 0.36, 1)";
            observer.observe(item);
        });
    </script>
</body>
</html>
