<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Chiu | 影像作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1B241B; /* 深森林綠 */
            color: #F2EFE9; /* 暖奶油白 */
            font-family: 'Noto Serif TC', serif;
            overflow: hidden; /* 保持首頁純淨，不顯示捲軸 */
        }

        /* 影片容器：強制全螢幕並置底 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 比例 */
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* 森林系濾鏡：增加層次感與文字可讀性 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(27,36,27,0.4) 0%, rgba(18,24,18,0.8) 100%);
            z-index: 0;
        }

        /* 導覽列：極簡設計 */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 4px;
            font-weight: 500;
        }

        .nav-links a {
            color: #F2EFE9;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* 主標題區塊 */
        main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 5;
            position: relative;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 2s ease-out;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            letter-spacing: 6px;
            opacity: 0.8;
            font-weight: 300;
            animation: fadeInUp 2.5s ease-out;
        }

        /* 進場動畫 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 底部裝飾文字 */
        .footer-note {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PETER CHIU</div>
        <div class="nav-links">
            <a href="#">WORKS</a>
            <a href="#">ABOUT</a>
            <a href="#">CONTACT</a>
        </div>
    </nav>

    <div class="video-background">
        <iframe 
            src="https://www.youtube.com/embed/3QTMVksP2xI?autoplay=1&mute=1&loop=1&playlist=3QTMVksP2xI&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
        <div class="overlay"></div>
    </div>

    <main>
        <h1 class="hero-title">棲身於林</h1>
        <p class="hero-subtitle">在移動的風景中，找尋靜謐的出口</p>
        <div class="footer-note">CINEMATIC & ASMR VISUALS</div>
    </main>

</body>
</html>
